<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>HSIM India — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
     background:linear-gradient(135deg,#053b30 0%,#0d8f6f 60%,#14b892 100%);
     min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.box{background:#fff;border-radius:18px;padding:44px 40px;width:100%;max-width:400px;
     box-shadow:0 24px 64px rgba(0,0,0,.22);position:relative;overflow:hidden}
.box::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,#d4a339 0%,#14b892 55%,#d4a339 100%)}
.logo{text-align:center;margin-bottom:32px}
.logo-icon{width:56px;height:56px;background:linear-gradient(135deg,#14b892,#0d8f6f);
           border-radius:15px;display:flex;align-items:center;justify-content:center;
           margin:0 auto 14px;box-shadow:0 4px 14px rgba(13,143,111,.35)}
.logo-icon svg{width:30px;height:30px;fill:none;stroke:#fff;stroke-width:2}
.co{font-family:'Inter';font-size:10px;color:#8a9490;text-transform:uppercase;letter-spacing:1.4px;font-weight:700}
.nm{font-family:'Sora';font-size:22px;font-weight:800;color:#053b30;letter-spacing:-.5px;margin-top:5px}
.yr{font-size:11px;color:#a0a8a4;margin-top:3px}
hr{border:none;border-top:1px solid #e3e8e5;margin:0 0 28px}
.fl{margin-bottom:16px}
label{font-size:10px;color:#5b6b64;font-weight:700;text-transform:uppercase;
      letter-spacing:.5px;display:block;margin-bottom:6px}
input{width:100%;border:1.5px solid #dde5e1;border-radius:9px;padding:11px 14px;
      font-size:13px;color:#0f1a16;outline:none;transition:all .15s}
input:focus{border-color:#14b892;box-shadow:0 0 0 3px rgba(20,184,146,.14)}
.btn{width:100%;padding:13px;background:linear-gradient(135deg,#14b892,#0d8f6f);
     color:#fff;border:none;border-radius:9px;font-size:14px;font-weight:700;
     cursor:pointer;transition:all .15s;margin-top:8px;display:flex;align-items:center;
     justify-content:center;gap:8px}
.btn:hover{box-shadow:0 6px 18px rgba(13,143,111,.4);transform:translateY(-1px)}
.btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
.err{background:#fdeaea;border:1px solid #f0b8b8;color:#7a1a1a;border-radius:8px;
     padding:10px 14px;font-size:12px;font-weight:600;margin-bottom:18px;display:none}
.err.show{display:block}
.foot{text-align:center;margin-top:22px;font-size:11px;color:#b7bfba}
.foot a{color:#0d8f6f;text-decoration:none;font-weight:600}
.spin{display:inline-block;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="box">
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><path d="M3 21h18"/><path d="M5 21V7l8-4v18"/><path d="M19 21V11l-6-4"/></svg>
    </div>
    <div class="co">HSIM India</div>
    <div class="nm">HR Dashboard</div>
    <div class="yr">Admin Login</div>
  </div>
  <hr>
  <div class="err" id="err"></div>
  <div class="fl">
    <label>Email Address</label>
    <input type="email" id="email" placeholder="Enter your email" autocomplete="email">
  </div>
  <div class="fl">
    <label>Password</label>
    <input type="password" id="pwd" placeholder="Enter your password" autocomplete="current-password">
  </div>
  <button class="btn" id="login-btn" onclick="doLogin()">Sign In →</button>
  <div class="foot">🔒 Secure · Private · HSIM India Internal<br><a href="/">Serve Vision Login</a></div>
</div>
<script>
const API = '/api';

document.getElementById('pwd').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});
document.getElementById('email').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('pwd').focus();
});

async function doLogin() {
  const email = document.getElementById('email').value.trim();
  const pwd   = document.getElementById('pwd').value;
  const btn   = document.getElementById('login-btn');
  const err   = document.getElementById('err');

  if (!email || !pwd) { showErr('Please enter email and password.'); return; }

  btn.disabled = true;
  btn.innerHTML = '<span class="spin">↻</span> Signing in...';
  err.classList.remove('show');

  try {
    const r = await fetch(API + '/hsim-login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password: pwd })
    });
    const data = await r.json();
    if (data.ok && data.token) {
      sessionStorage.setItem('hsim_token', data.token);
      sessionStorage.setItem('hsim_email', data.email);
      window.location.href = '/hsim-dashboard.html';
    } else {
      showErr(data.error || 'Invalid email or password.');
    }
  } catch(e) {
    showErr('Connection error. Please try again.');
  } finally {
    btn.disabled = false;
    btn.innerHTML = 'Sign In →';
  }
}

function showErr(msg) {
  const err = document.getElementById('err');
  err.textContent = msg;
  err.classList.add('show');
}
</script>
</body>
</html>
